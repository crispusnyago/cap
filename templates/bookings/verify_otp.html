<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title>CAP | Verify OTP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .otp-container {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .otp-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f0f7ff, #ffffff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 3px solid #D4AF37;
        }
        .otp-icon i {
            font-size: 40px;
            color: #D4AF37;
        }
        h1 {
            color: #0D1B3E;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #4a5568;
            margin-bottom: 25px;
        }
        .phone-display {
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            color: #0D1B3E;
        }
        .otp-input {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            text-align: center;
            letter-spacing: 8px;
            border: 2px solid #e1f0fa;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .otp-input:focus {
            border-color: #D4AF37;
            outline: none;
        }
        .btn-verify {
            width: 100%;
            background: #2A4B9E;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .btn-verify:hover {
            background: #1f3a7a;
        }
        .resend-link {
            color: #2A4B9E;
            text-decoration: none;
            font-size: 14px;
        }
        .resend-link:hover {
            color: #D4AF37;
        }
        .timer {
            color: #D4AF37;
            font-weight: 600;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="otp-container">
        <div class="otp-icon">
            <i class="fas fa-key"></i>
        </div>
        
        <h1>Verify Your Phone</h1>
        <p>We've sent a 6-digit code to your phone</p>
        
        <div class="phone-display">
            <i class="fas fa-phone"></i> {{ request.session.pending_payment.phone_number }}
        </div>
        
        <form method="post">
            {% csrf_token %}
            <input type="text" name="otp" class="otp-input" maxlength="6" 
                   placeholder="______" pattern="[0-9]{6}" required>
            
            <div class="timer" id="timer">05:00</div>
            
            <button type="submit" class="btn-verify">
                <i class="fas fa-check-circle"></i> Verify & Continue
            </button>
        </form>
        
        <a href="#" class="resend-link" onclick="resendOTP()">
            <i class="fas fa-redo-alt"></i> Resend Code
        </a>
    </div>
    
    <script>
        // Timer functionality
        let timeLeft = 300; // 5 minutes in seconds
        
        function updateTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const timerElement = document.getElementById('timer');
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                timerElement.textContent = "Expired";
                timerElement.style.color = "#EF4444";
            } else {
                timeLeft--;
                setTimeout(updateTimer, 1000);
            }
        }
        
        updateTimer();
        
        function resendOTP() {
            // Implement resend functionality
            alert('New OTP sent! Check your phone.');
            timeLeft = 300; // Reset timer
        }
    </script>
</body>
</html>
