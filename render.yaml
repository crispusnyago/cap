databases:
  - name: cap-db
    plan: free
    databaseName: cap
    user: cap_user

services:
  - type: web
    plan: free
    name: cap
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn cap.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cap-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false