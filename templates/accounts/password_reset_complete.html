<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAP | Password Changed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f0f7ff, #ffffff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .success-container {
            max-width: 450px;
            width: 90%;
            background: white;
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid #e1f0fa;
            text-align: center;
        }
        
        .logo-section {
            margin-bottom: 30px;
        }
        
        .logo-section img {
            max-width: 200px;
            height: auto;
            margin-bottom: 15px;
        }
        
        .logo-section h1 {
            font-size: 24px;
            color: #0D1B3E;
        }
        
        .logo-section .gold {
            color: #D4AF37;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f0fdf4, #ffffff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            border: 3px solid #10B981;
        }
        
        .success-icon i {
            font-size: 40px;
            color: #10B981;
        }
        
        h2 {
            color: #0D1B3E;
            margin-bottom: 15px;
            font-size: 28px;
        }
        
        p {
            color: #4a5568;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #D4AF37, #b8960c);
            color: #0D1B3E;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(212,175,55,0.5);
        }
        
        .footer-links {
            margin-top: 30px;
        }
        
        .footer-links a {
            color: #0D1B3E;
            text-decoration: none;
            font-size: 14px;
            margin: 0 10px;
        }
        
        .footer-links a:hover {
            color: #D4AF37;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="logo-section">
            <img src="{% static 'images/logo.jpg' %}" alt="CAP Logo">
            <h1>CAMPUS <span class="gold">ACCOMMODATION</span> PORTAL</h1>
        </div>
        
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>
        
        <h2>Password Changed!</h2>
        <p>Your password has been successfully reset. You can now log in with your new password.</p>
        
        <a href="{% url 'accounts:login' %}" class="btn-login">
            <i class="fas fa-sign-in-alt"></i> Log In Now
        </a>
        
        <div class="footer-links">
            <a href="{% url 'core:index' %}"><i class="fas fa-home"></i> Home</a>
            <span style="color: #cbd5e0;">|</span>
            <a href="{% url 'landlord:index' %}">Register</a>
        </div>
    </div>
</body>
</html>
