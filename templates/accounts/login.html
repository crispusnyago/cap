<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAP | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f0f7ff, #ffffff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            max-width: 450px;
            width: 90%;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid #e1f0fa;
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-section img {
            max-width: 200px;
            height: auto;
            margin-bottom: 15px;
        }
        
        .logo-section h1 {
            font-size: 24px;
            color: #0D1B3E;
        }
        
        .logo-section .gold {
            color: #D4AF37;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #0D1B3E;
        }
        
        .form-group label i {
            color: #D4AF37;
            margin-right: 5px;
        }
        
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e1f0fa;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: #D4AF37;
            outline: none;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.2);
        }
        
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #2A4B9E, #1f3a7a);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(42,75,158,0.5);
        }
        
        .forgot-password {
            text-align: right;
            margin-top: 5px;
            margin-bottom: 15px;
        }
        
        .forgot-password a {
            color: #2A4B9E;
            font-size: 13px;
            text-decoration: none;
        }
        
        .forgot-password a:hover {
            color: #D4AF37;
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .register-link a {
            color: #D4AF37;
            font-weight: 600;
            text-decoration: none;
        }
        
        .error-message {
            background: #fef2f2;
            border: 1px solid #EF4444;
            color: #EF4444;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .error-message i {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <img src="{% static 'images/logo.jpg' %}" alt="CAP Logo">
            <h1>CAMPUS <span class="gold">ACCOMMODATION</span> PORTAL</h1>
        </div>
        
        {% if form.errors %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            Invalid email or password. Please try again.
        </div>
        {% endif %}
        
        <form method="post" action="{% url 'accounts:login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="username" class="form-control" placeholder="demo@landlord.com" required>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div class="forgot-password">
                <a href="{% url 'password_reset' %}">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Log In
            </button>
        </form>
        
        <div class="register-link">
            Don't have an account? <a href="{% url 'landlord:index' %}">Register as Landlord</a>
        </div>
    </div>
</body>
</html>
